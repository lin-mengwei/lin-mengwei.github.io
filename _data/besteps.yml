# Hero
# About
about:
  description_en: >-
    <b>BESTEPS</b> is a training project for PhD economists, which I coordinated at the <a href="https://www.ub.edu/school-economics/" target="_blank">UB School of Economics</a> from 2024 to 2026, with funding from <a href="https://web.ub.edu/en/web/escola-doctorat/" target="_blank">EDUB</a>.</i>
    <br><br>
    It covers the life-cycle of PhD economics research, from identifying a promising project to producing research outputs such as a job market paper, through 7 lectures by leading European researchers.
    <br><br>
    Our book based on the lectures, <b>The BESTEPS Guide</b>, is <b>freely available</b> and can be downloaded below.
  highlights:
    - icon: "fa-graduation-cap"
      label: "7 Expert-led Lectures"
    - icon: "fa-download"
      label: "Open Access Book"
    - icon: "fa-route"
      label: "From Idea to Job Market Paper"
    - icon: "fa-globe"
      label: "Writing, Presenting, and Visualizing"

# Lectures
lectures:
  - part: "Part I: Set Up A Research Project"
    items:
      - tag: "Opening Lecture"
        title: "Navigating Research in Economics"
        speaker: "Antonio Cabrales"
        affiliation: "UC3M"

      - tag: "Lecture 1"
        title: "Starting a Feasible and Promising Project"
        speaker: "Libertad Gonzalez"
        affiliation: "UPF & BSE"

      - tag: "Lecture 2"
        title: "Doing Organized and Replicable Research"
        speaker: "Joan Llull"
        affiliation: "CSIC-IAE & BSE, Data Editor of Econometrica"

  - part: "Part II: Research Products"
    items:
      - tag: "Lecture 3"
        title: "Visualizing Economics Research"
        speakers:
          - name: "Dirk Foremny"
            affiliation: "UB & IEB"
          - name: "Guillermo Marin"
            affiliation: "Barcelona Supercomputing Center"

      - tag: "Lecture 4"
        title: "Presentations: How to Give an Academic Talk"
        speaker: "Jenifer Ruiz-Valenzuela"
        affiliation: "UB & IEB"

      - tag: "Lecture 5"
        title: "Crafting a Job Market Paper"
        speaker: "Albrecht Glitz"
        affiliation: "UPF & BSE"

      - tag: "Closing Lecture"
        title: "Research Products in Economics"
        speaker: "Diego Puga"
        affiliation: "CEMFI"

# The BESTEPS Guide
guide:
  title: "The BESTEPS Guide"
  subtitle: "7 Lessons towards Effective Economics PhD Research"
  image: "/assets/images/activities/besteps_guide.png"
  description: >-
    Based on the lectures, Anna Chesa and I edited <b>The BESTEPS Guide: 7 Lessons towards Effective Economics PhD Research</b>, available as a public good. 
    <br><br>
    The Guide walks through every key stage of economics research: understanding the research process and products, 
    choosing a feasible project, working reproducibly,
    visualizing data and results, giving academic talks, and crafting a job market paper.
    <br><br>
    See a detailed introduction in the <a href="https://www.ub.edu/school-economics/news/empowering-the-next-generation-of-economists-ubse-releases-the-besteps-guide/" target="_blank">news release</a> by the UB School of Economics. 

  url: "https://diposit.ub.edu/items/97432c44-013c-45d3-917b-aa87467f216d"
  label: "Download the Book"

